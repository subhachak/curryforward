<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Curryforward</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-50 text-stone-900 min-h-screen">
  <div id="app" class="max-w-5xl mx-auto p-6"></div>

<script>
const API = "/api";
let state = { view: "list", recipes: [], current: null, history: [], reviewQueue: [], role: "guest" };

function getAdminToken() {
  return localStorage.getItem("curryforward_admin_token") || "";
}

function setAdminToken(token) {
  localStorage.setItem("curryforward_admin_token", token);
}

async function api(path, opts = {}) {
  const token = getAdminToken();
  const res = await fetch(API + path, {
    headers: {
      "Content-Type": "application/json",
      ...(token ? { "X-Admin-Token": token } : {}),
    },
    ...opts,
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ detail: res.statusText }));
    throw new Error(err.detail || "Request failed");
  }
  return res.json();
}

async function refreshRole() {
  const me = await api("/me");
  state.role = me.role;
}

function el(html) {
  const div = document.createElement("div");
  div.innerHTML = html.trim();
  return div.firstElementChild;
}

async function loadList() {
  await refreshRole();
  state.recipes = await api("/recipes");
  state.reviewQueue = state.role === "admin" ? await api("/review-queue") : [];
  state.view = "list";
  render();
}

async function loadRecipe(recipeId) {
  await refreshRole();
  state.current = await api(`/recipes/${recipeId}`);
  state.history = await api(`/recipes/${recipeId}/history`);
  state.view = "detail";
  render();
}

async function sendChat(recipeId, message) {
  const btn = document.getElementById("chat-send");
  btn.disabled = true;
  btn.textContent = "Thinking...";
  try {
    const result = await api(`/recipes/${recipeId}/chat`, {
      method: "POST",
      body: JSON.stringify({ message }),
    });
    if (result.persisted) {
      await loadRecipe(recipeId);
      alert("Saved: " + result.change_summary);
    } else {
      // Guest path: show the draft in place without a DB round-trip / reload.
      state.current = { ...state.current, ...result.new_version };
      render();
      alert("Preview only (guest mode) — " + result.change_summary + "\n\n" + result.note);
    }
  } catch (e) {
    alert("Error: " + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = "Send";
  }
}

async function forkRecipe(recipeId) {
  const forked = await api(`/recipes/${recipeId}/fork`, { method: "POST" });
  await loadRecipe(forked.recipe_id);
}

async function decideReview(itemId, approved) {
  await api(`/review-queue/${itemId}/decide`, {
    method: "POST",
    body: JSON.stringify({ approved }),
  });
  await loadList();
}

async function generateNew() {
  const dish = document.getElementById("gen-dish-name").value;
  if (!dish) return;
  const btn = document.getElementById("gen-btn");
  btn.disabled = true;
  btn.textContent = "Generating (web search + LLM)...";
  try {
    const recipe = await api("/recipes/generate", {
      method: "POST",
      body: JSON.stringify({ dish_name: dish }),
    });
    await loadRecipe(recipe.recipe_id);
  } catch (e) {
    alert("Error: " + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = "Generate";
  }
}

function nutritionCard(nutrition) {
  if (!nutrition || Object.keys(nutrition).length === 0) {
    return `<div class="text-sm text-stone-400">No nutrition data yet</div>`;
  }
  const incomplete = nutrition.data_completeness === "partial";
  return `
    <div class="border rounded-lg p-4 bg-white">
      <div class="font-semibold mb-2 flex items-center justify-between">
        <span>Nutrition Facts</span>
        ${incomplete ? '<span class="text-xs text-amber-600 bg-amber-50 px-2 py-0.5 rounded">partial data</span>' : '<span class="text-xs text-green-600 bg-green-50 px-2 py-0.5 rounded">complete</span>'}
      </div>
      <div class="grid grid-cols-4 gap-2 text-sm">
        <div><div class="text-stone-400">Calories</div><div class="font-medium">${nutrition.calories}</div></div>
        <div><div class="text-stone-400">Protein</div><div class="font-medium">${nutrition.protein_g}g</div></div>
        <div><div class="text-stone-400">Fat</div><div class="font-medium">${nutrition.fat_g}g</div></div>
        <div><div class="text-stone-400">Carbs</div><div class="font-medium">${nutrition.carbs_g}g</div></div>
      </div>
      ${incomplete ? `<div class="text-xs text-stone-400 mt-2">Unmatched: ${nutrition.unmatched_ingredients.join(", ")}</div>` : ""}
    </div>`;
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  const isAdmin = state.role === "admin";
  const header = el(`
    <div class="mb-6 flex items-start justify-between">
      <div>
        <h1 class="text-2xl font-bold">🍛 Curryforward</h1>
        <p class="text-stone-500 text-sm">Your recipes — seeded, generated, and customized through chat.</p>
      </div>
      <div class="text-right">
        <span class="text-xs px-2 py-1 rounded ${isAdmin ? "bg-green-100 text-green-700" : "bg-stone-200 text-stone-600"}">${isAdmin ? "Admin" : "Guest (view + session-only chat)"}</span>
        <div class="flex gap-1 mt-1">
          <input id="admin-token-input" type="password" placeholder="Admin token" value="${getAdminToken()}" class="border rounded px-2 py-1 text-xs w-32" />
          <button id="admin-token-save" class="text-xs border rounded px-2 py-1">Set</button>
        </div>
      </div>
    </div>`);
  app.appendChild(header);
  header.querySelector("#admin-token-save").onclick = () => {
    setAdminToken(header.querySelector("#admin-token-input").value.trim());
    loadList();
  };

  if (state.view === "list") {
    renderList(app);
  } else if (state.view === "detail") {
    renderDetail(app);
  }
}

function renderList(app) {
  const genBox = el(`
    <div class="border rounded-lg p-4 mb-6 bg-white">
      <div class="font-semibold mb-2">Don't see what you want? Generate a new base recipe</div>
      <div class="flex gap-2">
        <input id="gen-dish-name" placeholder="e.g. Thai Green Curry" class="border rounded px-3 py-2 flex-1" />
        <button id="gen-btn" class="bg-orange-600 text-white px-4 py-2 rounded">Generate</button>
      </div>
    </div>`);
  app.appendChild(genBox);
  document.getElementById("gen-btn").onclick = generateNew;

  if (state.reviewQueue.length > 0) {
    const reviewBox = el(`<div class="border border-amber-300 bg-amber-50 rounded-lg p-4 mb-6">
      <div class="font-semibold mb-2">⚠️ Review Queue (${state.reviewQueue.length}) — needs your approval</div>
      <div id="review-list" class="space-y-2"></div>
    </div>`);
    app.appendChild(reviewBox);
    const list = reviewBox.querySelector("#review-list");
    state.reviewQueue.forEach(item => {
      const row = el(`
        <div class="flex items-center justify-between bg-white rounded p-2 border">
          <div>
            <div class="font-medium">${item.name}</div>
            <div class="text-xs text-stone-500">${item.review_reason || ""} (confidence ${item.extraction_confidence})</div>
          </div>
          <div class="flex gap-2">
            <button class="text-green-700 bg-green-50 px-3 py-1 rounded text-sm" data-approve="${item.item_id}">Approve</button>
            <button class="text-red-700 bg-red-50 px-3 py-1 rounded text-sm" data-reject="${item.item_id}">Reject</button>
          </div>
        </div>`);
      row.querySelector("[data-approve]").onclick = () => decideReview(item.item_id, true);
      row.querySelector("[data-reject]").onclick = () => decideReview(item.item_id, false);
      list.appendChild(row);
    });
  }

  const grid = el(`<div class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>`);
  state.recipes.forEach(r => {
    const card = el(`
      <div class="border rounded-lg p-4 bg-white cursor-pointer hover:shadow-md transition">
        <div class="font-semibold">${r.name}</div>
        <div class="text-xs text-stone-400 mt-1">${r.category || ""} · ${r.lineage}</div>
      </div>`);
    card.onclick = () => loadRecipe(r.recipe_id);
    grid.appendChild(card);
  });
  app.appendChild(grid);
}

function renderDetail(app) {
  const r = state.current;
  const back = el(`<button class="text-sm text-stone-500 mb-4">&larr; Back to recipes</button>`);
  back.onclick = loadList;
  app.appendChild(back);

  const titleRow = el(`
    <div class="flex items-center justify-between mb-4">
      <div>
        <h2 class="text-xl font-bold">${r.name}</h2>
        <div class="text-sm text-stone-500">Base: ${r.base_servings.amount} ${r.base_servings.unit} · lineage: ${r.lineage} · version ${r.version_id}</div>
      </div>
      ${state.role === "admin"
        ? `<button id="fork-btn" class="border px-3 py-1.5 rounded text-sm">Fork this recipe</button>`
        : `<span class="text-xs text-stone-400">Guest mode — forking disabled</span>`}
    </div>`);
  app.appendChild(titleRow);
  if (state.role === "admin") {
    titleRow.querySelector("#fork-btn").onclick = () => forkRecipe(r.recipe_id);
  }

  app.appendChild(el(`<div class="mb-4">${nutritionCard(r.nutrition)}</div>`));

  const compBox = el(`<div class="grid md:grid-cols-2 gap-4 mb-4"></div>`);
  r.components.forEach(c => {
    const box = el(`
      <div class="border rounded-lg p-4 bg-white">
        <div class="font-semibold mb-2">${c.component_name}</div>
        <ul class="text-sm space-y-1"></ul>
      </div>`);
    const ul = box.querySelector("ul");
    c.ingredients.forEach(i => {
      ul.appendChild(el(`<li>${i.amount ?? "?"} ${i.unit} — ${i.name}</li>`));
    });
    compBox.appendChild(box);
  });
  app.appendChild(compBox);

  const stepsBox = el(`
    <div class="border rounded-lg p-4 bg-white mb-4">
      <div class="font-semibold mb-2">Steps</div>
      <ol class="text-sm space-y-2 list-decimal list-inside"></ol>
    </div>`);
  const ol = stepsBox.querySelector("ol");
  r.steps.forEach(s => {
    ol.appendChild(el(`<li>${s.instruction}${s.component_ref ? ` <span class="text-xs text-stone-400">(${s.component_ref})</span>` : ""}</li>`));
  });
  app.appendChild(stepsBox);

  const chatBox = el(`
    <div class="border rounded-lg p-4 bg-white mb-4">
      <div class="font-semibold mb-2">Customize via chat</div>
      ${state.role !== "admin" ? '<div class="text-xs text-amber-600 mb-2">Guest mode: changes preview for this session only — not saved, not forkable.</div>' : ""}
      <div class="flex gap-2">
        <input id="chat-input" placeholder="e.g. make it spicier, halve the sugar..." class="border rounded px-3 py-2 flex-1" />
        <button id="chat-send" class="bg-orange-600 text-white px-4 py-2 rounded">Send</button>
      </div>
    </div>`);
  chatBox.querySelector("#chat-send").onclick = () => {
    const input = chatBox.querySelector("#chat-input");
    if (input.value.trim()) sendChat(r.recipe_id, input.value.trim());
  };
  app.appendChild(chatBox);

  const histBox = el(`
    <div class="border rounded-lg p-4 bg-white">
      <div class="font-semibold mb-2">Version History</div>
      <div class="text-sm space-y-1"></div>
    </div>`);
  const histList = histBox.querySelector("div.text-sm");
  state.history.forEach(v => {
    histList.appendChild(el(`<div>${v.created_at} — ${v.lineage} (${v.source}) ${v.is_current_head ? "← current" : ""}</div>`));
  });
  app.appendChild(histBox);
}

loadList();
</script>
</body>
</html>
