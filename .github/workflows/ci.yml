name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Run backend tests
        run: uv run --with-requirements backend/requirements.txt pytest

  frontend:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: frontend-next
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend-next/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
